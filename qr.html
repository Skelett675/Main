<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0c0d10;
  color:white;
}

.container{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:480px;
  padding:30px;
  border-radius:25px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  text-align:center;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:#111;
  color:white;
}

/* QR WRAPPER CENTRING FIX */
#qr-wrapper{
  margin-top:20px;
  display:flex;
  justify-content:center;
  align-items:center;

  padding:30px;
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  box-shadow:0 0 25px rgba(57,150,249,0.3);
}

/* QR CENTER FIX */
#qr{
  display:flex;
  justify-content:center;
  align-items:center;
}

button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border-radius:14px;
  border:none;
  background:#3996F9;
  font-weight:bold;
  cursor:pointer;
}

</style>

</head>

<body>

<div class="container">
<div class="card">

<h2>QR Generator</h2>

<input id="text" placeholder="Text" oninput="generateQR()">

<div id="qr-wrapper">
  <div id="qr"></div>
</div>

<button onclick="downloadQR()">Download</button>

</div>
</div>

<script>

function generateQR(){

const text = document.getElementById("text").value;
const box = document.getElementById("qr");

if(!text) return;

box.innerHTML="";

new QRCode(box,{
text:text,
width:220,
height:220,
colorDark:"#000",
colorLight:"#fff",
correctLevel:QRCode.CorrectLevel.H
});

}

function downloadQR(){

html2canvas(document.getElementById("qr-wrapper"),{
backgroundColor:"#fff",
scale:3
}).then(canvas=>{

const a=document.createElement("a");
a.download="qr.png";
a.href=canvas.toDataURL("image/png");
a.click();

});

}

</script>

</body>
</html>

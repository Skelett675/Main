<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>QR Generator Pro</title>

<link rel="stylesheet" href="style.css">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
.container{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* 🔥 SAME STYLE LIKE COLOR TOOL */
.card{
  width:460px;
  padding:35px;
  border-radius:30px;

  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(25px);

  text-align:center;

  box-shadow:0 0 40px rgba(57,150,249,0.15);
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-top:10px;

  border-radius:14px;
  border:none;

  background:rgba(0,0,0,0.4);
  color:white;
}

/* DROP */
.dropzone{
  margin-top:10px;
  padding:18px;

  border:2px dashed rgba(255,255,255,0.25);
  border-radius:18px;

  cursor:pointer;

  transition:0.3s;
}

.dropzone:hover{
  border-color:#3996F9;
  box-shadow:0 0 25px #3996F9;
}

/* QR BOX */
#qr-container{
  margin-top:20px;

  width:220px;
  height:220px;

  margin-left:auto;
  margin-right:auto;

  background:white;
  border-radius:18px;

  position:relative;

  display:flex;
  justify-content:center;
  align-items:center;

  transition:0.4s;
}

/* ANIMATION */
.qr-anim{
  transform:scale(0.7);
  opacity:0;
  animation:pop 0.5s forwards;
}

@keyframes pop{
  to{
    transform:scale(1);
    opacity:1;
  }
}

/* LOGO */
#logo{
  position:absolute;
  border-radius:12px;
  object-fit:cover;
  z-index:10;
}

/* SLIDER */
input[type=range]{
  margin-top:10px;
}

/* BUTTON */
button{
  margin-top:10px;
  width:100%;
  padding:12px;

  border-radius:16px;
  border:none;

  background:#3996F9;
  color:black;

  font-weight:bold;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="glow"></div>

<div class="container">
  <div class="card">

    <h2>QR Generator Pro</h2>

    <input type="text" id="text" placeholder="Text / Link" oninput="generateQR()">

    <!-- DROP LOGO -->
    <div class="dropzone" ondrop="dropHandler(event)" ondragover="event.preventDefault()">
      Logo hier reinziehen / klicken
      <input type="file" id="file" accept="image/*" hidden onchange="loadFile(event)">
    </div>

    <!-- LOGO SIZE -->
    <label>Logo Größe</label>
    <input type="range" min="30" max="120" value="55" oninput="resizeLogo(this.value)">

    <!-- QR -->
    <div id="qr-container">
      <div id="qrcode"></div>
      <img id="logo" style="display:none;">
    </div>

    <button onclick="downloadQR()">Download QR</button>

  </div>
</div>

<script>

let qr;

/* QR GENERATE + ANIMATION */
function generateQR(){

  const text = document.getElementById("text").value;
  const container = document.getElementById("qrcode");
  const qrBox = document.getElementById("qr-container");

  container.innerHTML = "";

  if(!text) return;

  qr = new QRCode(container, {
    text:text,
    width:220,
    height:220,
    colorDark:"#000",
    colorLight:"#fff",
    correctLevel:QRCode.CorrectLevel.H
  });

  /* 🔥 animation reset */
  qrBox.classList.remove("qr-anim");
  void qrBox.offsetWidth;
  qrBox.classList.add("qr-anim");
}

/* LOGO UPLOAD */
document.querySelector(".dropzone").onclick = () => {
  document.getElementById("file").click();
};

function loadFile(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = evt => {
    const img = document.getElementById("logo");
    img.src = evt.target.result;
    img.style.display = "block";
    resizeLogo(55);
  };

  reader.readAsDataURL(file);
}

/* DROP */
function dropHandler(ev){
  ev.preventDefault();

  const file = ev.dataTransfer.files[0];
  const reader = new FileReader();

  reader.onload = evt => {
    const img = document.getElementById("logo");
    img.src = evt.target.result;
    img.style.display = "block";
    resizeLogo(55);
  };

  reader.readAsDataURL(file);
}

/* LOGO RESIZE SLIDER */
function resizeLogo(size){
  const img = document.getElementById("logo");
  img.style.width = size + "px";
  img.style.height = size + "px";
}

/* DOWNLOAD FIX */
function downloadQR(){

  html2canvas(document.getElementById("qr-container"), {
    useCORS:true,
    backgroundColor:"#ffffff"
  }).then(canvas => {

    let a=document.createElement("a");
    a.download="qr.png";
    a.href=canvas.toDataURL("image/png");
    a.click();

  });

}

</script>

</body>
</html>

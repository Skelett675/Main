<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>QR Generator</title>
<link rel="stylesheet" href="style.css">

<style>
.qr-box {
  margin-top: 20px;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  backdrop-filter: blur(20px);
  display: inline-block;
}

#qr canvas {
  border-radius: 12px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
  transition: 0.3s;
}

#qr canvas:hover {
  transform: scale(1.05);
}

#dropzone {
  padding: 15px;
  border-radius: 12px;
  border: 2px dashed var(--accent);
  margin: 10px 0;
  cursor: pointer;
  opacity: 0.8;
  transition: 0.3s;
}

#dropzone:hover {
  opacity: 1;
  box-shadow: 0 0 15px var(--accent);
}

button {
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="glow"></div>

<div class="container">
  <div class="card">

    <h1>QR Generator</h1>

    <input id="text" placeholder="Text oder Link"
      style="width:100%;padding:10px;border-radius:10px;border:none;margin-bottom:10px;">

    <div id="dropzone">Bild hier reinziehen (optional Logo)</div>
    <input type="file" id="file" hidden>

    <button onclick="generate()">QR erstellen</button>
    <button onclick="downloadQR()">Download</button>

    <div class="qr-box">
      <div id="qr"></div>
    </div>

    <button onclick="location.href='index.html'">Zurück</button>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
let canvasGlobal = null;
let logo = null;

const dropzone = document.getElementById("dropzone");

dropzone.onclick = () => document.getElementById("file").click();

dropzone.ondragover = e => e.preventDefault();

dropzone.ondrop = e => {
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
};

document.getElementById("file").onchange = e => {
  handleFile(e.target.files[0]);
};

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    logo = e.target.result;
    dropzone.innerText = "Bild geladen ✔";
  };
  reader.readAsDataURL(file);
}

function generate() {
  const text = document.getElementById("text").value;
  const qrDiv = document.getElementById("qr");

  qrDiv.innerHTML = "";

  const canvas = document.createElement("canvas");
  canvasGlobal = canvas;

  QRCode.toCanvas(canvas, text, {
    width: 300,
    margin: 2,
    errorCorrectionLevel: "H"
  }, function () {
    qrDiv.appendChild(canvas);

    /* LOGO NICHT RUND */
    if (logo) {
      const img = document.createElement("img");
      img.src = logo;

      img.style.position = "absolute";
      img.style.width = "70px";
      img.style.height = "70px";
      img.style.left = "50%";
      img.style.top = "50%";
      img.style.transform = "translate(-50%, -50%)";
      img.style.borderRadius = "0"; /* 🔥 WICHTIG: NICHT RUND */
      img.style.boxShadow = "0 10px 30px rgba(0,0,0,0.4)";

      qrDiv.style.position = "relative";
      qrDiv.appendChild(img);
    }
  });
}

function downloadQR() {
  if (!canvasGlobal) return alert("Erst QR erstellen!");

  const link = document.createElement("a");
  link.download = "qr.png";
  link.href = canvasGlobal.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>QR Code Generator + Logo</title>

<link rel="stylesheet" href="style.css">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
.container{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:420px;
  padding:30px;
  border-radius:28px;

  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(25px);

  text-align:center;
}

/* DROP ZONE */
.dropzone{
  margin-top:10px;
  padding:20px;

  border:2px dashed rgba(255,255,255,0.3);
  border-radius:18px;

  cursor:pointer;
  color:white;

  transition:0.2s;
}

.dropzone:hover{
  border-color:#3996F9;
  box-shadow:0 0 20px #3996F9;
}

/* QR AREA */
#qr-container{
  margin-top:20px;
  position:relative;

  width:220px;
  height:220px;

  margin-left:auto;
  margin-right:auto;

  background:white;
  border-radius:18px;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* LOGO OVER QR */
#logo{
  position:absolute;
  width:55px;
  height:55px;

  border-radius:12px;

  object-fit:cover;

  z-index:10;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-top:10px;

  border-radius:14px;
  border:none;

  background:rgba(0,0,0,0.4);
  color:white;
}

/* BUTTON */
button{
  margin-top:10px;
  width:100%;
  padding:12px;

  border-radius:14px;
  border:none;

  background:#3996F9;
  color:black;

  font-weight:bold;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="glow"></div>

<div class="container">
  <div class="card">

    <h2>QR + Logo Generator</h2>

    <input type="text" id="text" placeholder="Link / Text" oninput="generateQR()">

    <!-- DROP LOGO -->
    <div class="dropzone" ondrop="dropHandler(event)" ondragover="event.preventDefault()">
      Logo hier reinziehen oder klicken
      <input type="file" id="file" accept="image/*" style="display:none" onchange="loadFile(event)">
    </div>

    <!-- QR -->
    <div id="qr-container">
      <div id="qrcode"></div>
      <img id="logo" style="display:none;">
    </div>

    <button onclick="downloadQR()">Download QR</button>

  </div>
</div>

<script>

let qr;

function generateQR(){

  const text = document.getElementById("text").value;
  const container = document.getElementById("qrcode");

  container.innerHTML = "";

  if(!text) return;

  qr = new QRCode(container, {
    text: text,
    width: 220,
    height: 220,
    colorDark : "#000",
    colorLight : "#fff",
    correctLevel : QRCode.CorrectLevel.H
  });
}

/* FILE UPLOAD */
document.querySelector(".dropzone").onclick = () => {
  document.getElementById("file").click();
};

function loadFile(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(evt){
    const img = document.getElementById("logo");
    img.src = evt.target.result;
    img.style.display = "block";
  };

  reader.readAsDataURL(file);
}

/* DROP SUPPORT */
function dropHandler(ev){
  ev.preventDefault();

  const file = ev.dataTransfer.files[0];
  const reader = new FileReader();

  reader.onload = function(evt){
    const img = document.getElementById("logo");
    img.src = evt.target.result;
    img.style.display = "block";
  };

  reader.readAsDataURL(file);
}

/* DOWNLOAD FIX */
function downloadQR(){

  html2canvas(document.getElementById("qr-container"), {
    useCORS: true,
    allowTaint: true,
    backgroundColor: "#ffffff"
  }).then(canvas => {

    let link = document.createElement("a");
    link.download = "qr-with-logo.png";
    link.href = canvas.toDataURL("image/png");
    link.click();

  });

}

</script>

</body>
</html>

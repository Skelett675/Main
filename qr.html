<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>QR Generator Pro</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
.container{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:480px;
  padding:35px;
  border-radius:30px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(25px);
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  background:rgba(0,0,0,0.4);
  color:white;
}

#qr-container{
  margin-top:20px;
  width:250px;
  height:250px;

  margin-left:auto;
  margin-right:auto;

  background:#ffffff;
  border-radius:20px;

  display:flex;
  justify-content:center;
  align-items:center;
}

#qrcode canvas,
#qrcode img{
  opacity:1 !important;
  filter:none !important;
}

.style-row{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

.style-row button{
  padding:8px 12px;
  border-radius:14px;
  border:none;
  cursor:pointer;
}

.style-row button.active{
  background:#3996F9;
  box-shadow:0 0 15px #3996F9;
}

.main{
  width:100%;
  margin-top:15px;
  padding:12px;
  border-radius:16px;
  border:none;
  background:#3996F9;
  color:black;
  font-weight:bold;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="glow"></div>

<div class="container">
<div class="card">

<h2>QR Generator Pro</h2>

<input
type="text"
id="text"
placeholder="Text oder Link eingeben"
oninput="generateQR()"
>

<div class="style-row">
<button onclick="setStyle(this)" class="active">Classic</button>
<button onclick="setStyle(this)">Rounded</button>
<button onclick="setStyle(this)">Soft</button>
<button onclick="setStyle(this)">Extra</button>
</div>

<div id="qr-container">
<div id="qrcode"></div>
</div>

<button class="main" onclick="downloadQR()">
Download QR
</button>

</div>
</div>

<script>

let qr;

function generateQR(){

  const text =
    document.getElementById("text").value;

  const box =
    document.getElementById("qrcode");

  box.innerHTML = "";

  if(!text) return;

  qr = new QRCode(box,{
    text:text,
    width:220,
    height:220,
    colorDark:"#000000",
    colorLight:"#ffffff",
    correctLevel:QRCode.CorrectLevel.H
  });

}

function setStyle(btn){

  document
  .querySelectorAll(".style-row button")
  .forEach(b=>b.classList.remove("active"));

  btn.classList.add("active");

}

function downloadQR(){

  const qr =
    document.getElementById("qrcode");

  html2canvas(qr,{
    backgroundColor:"#ffffff",
    scale:3,
    useCORS:true
  })
  .then(canvas=>{

    const a =
      document.createElement("a");

    a.download = "qr.png";
    a.href = canvas.toDataURL("image/png");
    a.click();

  });

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>QR Code Generator</title>

<style>
body{
  margin:0;
  background:#0c0d10;
  font-family:Arial;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:420px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.06);
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#3996F9;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

#qrcode{
  margin-top:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
  background:#111;
  border-radius:12px;
}

</style>
</head>

<body>

<div class="card">

<h2>QR Generator</h2>

<input id="text" placeholder="Text oder Link">

<button onclick="generate()">Generate QR</button>
<button onclick="downloadQR()">Download</button>

<div id="qrcode"></div>

</div>

<!-- QR Library -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<script>

let qr;

function generate(){
  const text = document.getElementById("text").value || "Hello";

  document.getElementById("qrcode").innerHTML = "";

  qr = new QRCode(document.getElementById("qrcode"), {
    text: text,
    width: 220,
    height: 220,
    colorDark: "#000000",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });
}

/* 🔥 CLEAN DOWNLOAD (NO WHITE BORDER) */
function downloadQR(){

  const canvas = document.querySelector("#qrcode canvas");

  if(!canvas){
    alert("Bitte erst QR generieren");
    return;
  }

  const ctx = canvas.getContext("2d");
  const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
  const data = imgData.data;

  let top=canvas.height, bottom=0, left=canvas.width, right=0;

  for(let y=0;y<canvas.height;y++){
    for(let x=0;x<canvas.width;x++){

      let i=(y*canvas.width+x)*4;

      let alpha=data[i+3];

      if(alpha>0){
        if(x<left) left=x;
        if(x>right) right=x;
        if(y<top) top=y;
        if(y>bottom) bottom=y;
      }
    }
  }

  let w=right-left;
  let h=bottom-top;

  let cropped=document.createElement("canvas");
  cropped.width=w;
  cropped.height=h;

  let cctx=cropped.getContext("2d");

  cctx.drawImage(canvas,
    left,top,w,h,
    0,0,w,h
  );

  let link=document.createElement("a");
  link.download="qr.png";
  link.href=cropped.toDataURL("image/png");
  link.click();
}

</script>

</body>
</html>

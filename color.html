```html
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Farbcode Generator</title>
<link rel="stylesheet" href="style.css">

<style>
.generator{
    max-width:900px;
    margin:auto;
}

.preview{
    min-height:100px;
    padding:20px;
    margin-top:20px;

    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(20px);

    border-radius:20px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:40px;
    font-weight:bold;

    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.output{
    margin-top:20px;
    padding:15px;
    border-radius:15px;
    background:#111;
    word-break:break-all;
}

.colors{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    margin-top:20px;
}

.colorBox{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.effects{
    margin-top:20px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.buttons{
    margin-top:25px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
</style>

</head>
<body>

<div class="glow"></div>

<div class="container">

<div class="card generator">

<h1>🎨 Farbcode Generator</h1>

<input
id="text"
type="text"
placeholder="Text eingeben"
style="
width:100%;
padding:12px;
border-radius:12px;
border:none;
font-size:16px;
">

<div class="colors">

<div class="colorBox">
<label>Farbe 1</label>
<input type="color" id="color1" value="#3996F9">
<input type="text" id="hex1" value="#3996F9">
</div>

<div class="colorBox">
<label>Farbe 2</label>
<input type="color" id="color2" value="#00D4FF">
<input type="text" id="hex2" value="#00D4FF">
</div>

</div>

<br>

<label>
<input type="checkbox" id="gradient" checked>
Farbverlauf benutzen
</label>

<div class="effects">

<label>
<input type="checkbox" id="bold">
Fett
</label>

<label>
<input type="checkbox" id="italic">
Kursiv
</label>

<label>
<input type="checkbox" id="underline">
Unterstrichen
</label>

<label>
<input type="checkbox" id="strike">
Durchgestrichen
</label>

</div>

<div id="preview" class="preview">
Vorschau
</div>

<div id="output" class="output">
Code erscheint hier
</div>

<div class="buttons">

<button onclick="generate()">
Generieren
</button>

<button onclick="copyCode()">
Code kopieren
</button>

<button onclick="copyLink()">
Link kopieren
</button>

<button onclick="location.href='index.html'">
Zurück
</button>

</div>

</div>
</div>

<script>

function lerp(a,b,t){
    return Math.round(a+(b-a)*t);
}

function hexToRgb(hex){
    hex = hex.replace("#","");

    return{
        r:parseInt(hex.substring(0,2),16),
        g:parseInt(hex.substring(2,4),16),
        b:parseInt(hex.substring(4,6),16)
    };
}

function rgbToHex(r,g,b){
    return "#"+
    r.toString(16).padStart(2,"0")+
    g.toString(16).padStart(2,"0")+
    b.toString(16).padStart(2,"0");
}

function generate(){

    const text =
    document.getElementById("text").value;

    const preview =
    document.getElementById("preview");

    const output =
    document.getElementById("output");

    const c1 =
    document.getElementById("hex1").value;

    const c2 =
    document.getElementById("hex2").value;

    const gradient =
    document.getElementById("gradient").checked;

    preview.innerHTML = "";

    if(!text){
        output.innerText = "";
        return;
    }

    let code = "";

    if(
        document.getElementById("bold").checked
    ){
        code += "&l";
    }

    if(
        document.getElementById("italic").checked
    ){
        code += "&o";
    }

    if(
        document.getElementById("underline").checked
    ){
        code += "&n";
    }

    if(
        document.getElementById("strike").checked
    ){
        code += "&m";
    }

    if(!gradient){

        preview.innerHTML =
        `<span style="color:${c1}">
        ${text}
        </span>`;

        output.innerText =
        code +
        "&#" +
        c1.replace("#","") +
        text;

        return;
    }

    const rgb1 = hexToRgb(c1);
    const rgb2 = hexToRgb(c2);

    for(
        let i=0;
        i<text.length;
        i++
    ){

        const t =
        i/(text.length-1||1);

        const r =
        lerp(rgb1.r,rgb2.r,t);

        const g =
        lerp(rgb1.g,rgb2.g,t);

        const b =
        lerp(rgb1.b,rgb2.b,t);

        const hex =
        rgbToHex(r,g,b);

        const span =
        document.createElement("span");

        span.style.color = hex;
        span.textContent = text[i];

        preview.appendChild(span);

        code +=
        "&#"+
        hex.replace("#","")+
        text[i];
    }

    output.innerText = code;
}

function copyCode(){

    navigator.clipboard.writeText(
        document.getElementById("output")
        .innerText
    );
}

function copyLink(){

    const text =
    encodeURIComponent(
        document.getElementById("text").value
    );

    navigator.clipboard.writeText(
        location.href +
        "?text=" +
        text
    );
}

document.getElementById("text")
.addEventListener(
    "input",
    generate
);

document.getElementById("color1")
.oninput = e => {

    hex1.value =
    e.target.value;

    generate();
};

document.getElementById("color2")
.oninput = e => {

    hex2.value =
    e.target.value;

    generate();
};

document.getElementById("hex1")
.oninput = generate;

document.getElementById("hex2")
.oninput = generate;

document.getElementById("gradient")
.onchange = generate;

document.getElementById("bold")
.onchange = generate;

document.getElementById("italic")
.onchange = generate;

document.getElementById("underline")
.onchange = generate;

document.getElementById("strike")
.onchange = generate;

generate();

</script>

</body>
</html>
```

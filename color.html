```html
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Color Generator</title>

<link rel="stylesheet" href="style.css">

<style>
.container{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:550px;
  padding:35px;
  border-radius:30px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(25px);
  text-align:center;
  color:white;
  box-shadow:0 0 35px rgba(57,150,249,0.25);
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  background:rgba(0,0,0,0.4);
  color:white;
}

.preview{
  margin-top:20px;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,0.06);
  min-height:80px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  font-weight:bold;
}

.code{
  margin-top:10px;
  padding:15px;
  border-radius:16px;
  background:#111;
  color:#0f0;
  font-family:monospace;
  word-break:break-word;
}

.row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-top:15px;
}

label{
  background:rgba(255,255,255,0.08);
  padding:8px 12px;
  border-radius:12px;
}

button{
  margin-top:15px;
  width:100%;
  padding:12px;
  border-radius:16px;
  border:none;
  background:#3996F9;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:translateY(-2px);
}

.color-list{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  margin-top:15px;
}

.color-box{
  width:55px;
  height:55px;
  border-radius:14px;
  border:2px solid rgba(255,255,255,0.15);
  cursor:pointer;
  transition:0.2s;
  box-shadow:
    0 0 12px rgba(255,255,255,0.08),
    inset 0 0 12px rgba(255,255,255,0.08);
}

.color-box:hover{
  transform:scale(1.08);
  box-shadow:
    0 0 20px rgba(255,255,255,0.2);
}
</style>

</head>
<body>

<div class="glow"></div>

<div class="container">
<div class="card">

<h2>Color Generator</h2>

<input type="text"
id="text"
placeholder="Text eingeben"
oninput="update()">

<select id="mode" onchange="update()">
  <option value="single">Einfarbig</option>
  <option value="gradient" selected>Gradient</option>
  <option value="rainbow">Rainbow</option>
</select>

<div class="row">
<label><input type="checkbox" id="bold" onchange="update()"> Fett</label>
<label><input type="checkbox" id="italic" onchange="update()"> Kursiv</label>
<label><input type="checkbox" id="underline" onchange="update()"> Unterstrichen</label>
<label><input type="checkbox" id="strike" onchange="update()"> Durchgestrichen</label>
</div>

<button onclick="addColor()">
🎨 Farbe hinzufügen
</button>

<div id="colorList"
class="color-list"></div>

<div class="preview" id="preview">
Preview
</div>

<div class="code" id="code">
Code
</div>

<button onclick="copy()">
📋 Copy
</button>

</div>
</div>

<script>

let colors = [
  randomColor(),
  randomColor()
];

function randomColor(){
  return "#" +
  Math.floor(Math.random()*16777215)
  .toString(16)
  .padStart(6,"0");
}

function renderColors(){

  const list =
  document.getElementById("colorList");

  list.innerHTML = "";

  colors.forEach((color,index)=>{

    const box =
    document.createElement("div");

    box.className =
    "color-box";

    box.style.background =
    color;

    box.onclick = ()=>{

      const picker =
      document.createElement("input");

      picker.type =
      "color";

      picker.value =
      color;

      picker.oninput =
      e=>{

        colors[index] =
        e.target.value;

        renderColors();
        update();
      };

      picker.click();
    };

    list.appendChild(box);

  });
}

function addColor(){

  colors.push(
    randomColor()
  );

  renderColors();
  update();
}

function boostColor(hex,factor){

  let c =
  hex.replace("#","");

  let r =
  parseInt(c.substring(0,2),16);

  let g =
  parseInt(c.substring(2,4),16);

  let b =
  parseInt(c.substring(4,6),16);

  r =
  Math.min(255,
  Math.floor(r*factor));

  g =
  Math.min(255,
  Math.floor(g*factor));

  b =
  Math.min(255,
  Math.floor(b*factor));

  return `rgb(${r},${g},${b})`;
}

function update(){

  const text =
  document.getElementById("text")
  .value || "Preview";

  const mode =
  document.getElementById("mode")
  .value;

  const preview =
  document.getElementById("preview");

  const code =
  document.getElementById("code");

  const bold =
  document.getElementById("bold")
  .checked ? "&l" : "";

  const italic =
  document.getElementById("italic")
  .checked ? "&o" : "";

  const underline =
  document.getElementById("underline")
  .checked ? "&n" : "";

  const strike =
  document.getElementById("strike")
  .checked ? "&m" : "";

  let format =
  bold + italic +
  underline + strike;

  let out = "";

  preview.innerText =
  text;

  preview.style.background =
  "";

  preview.style.color =
  "white";

  preview.style.webkitBackgroundClip =
  "unset";

  preview.style.fontWeight =
  document.getElementById("bold")
  .checked ? "bold" : "normal";

  preview.style.fontStyle =
  document.getElementById("italic")
  .checked ? "italic" : "normal";

  let deco = [];

  if(
  document.getElementById("underline")
  .checked
  ) deco.push("underline");

  if(
  document.getElementById("strike")
  .checked
  ) deco.push("line-through");

  preview.style.textDecoration =
  deco.join(" ");

  if(mode==="single"){

    preview.style.color =
    colors[0];

    out =
    `&#${colors[0].replace("#","")}${format}${text}`;
  }

  if(mode==="gradient"){

    preview.style.background =
    `linear-gradient(
      90deg,
      ${colors.join(",")}
    )`;

    preview.style.webkitBackgroundClip =
    "text";

    preview.style.color =
    "transparent";

    for(
      let i=0;
      i<text.length;
      i++
    ){

      out +=
      `&#${
      colors[
      i % colors.length
      ].replace("#","")
      }${format}${text[i]}`;
    }
  }

  if(mode==="rainbow"){

    const rainbow = [
      "#ff0000",
      "#ff7a00",
      "#ffee00",
      "#00ff4c",
      "#00e5ff",
      "#004cff",
      "#b300ff"
    ];

    preview.style.background =
    `linear-gradient(
      90deg,
      ${rainbow.join(",")}
    )`;

    preview.style.webkitBackgroundClip =
    "text";

    preview.style.color =
    "transparent";

    for(
      let i=0;
      i<text.length;
      i++
    ){

      out +=
      `&#${
      rainbow[
      i % rainbow.length
      ].replace("#","")
      }${format}${text[i]}`;
    }
  }

  code.innerText =
  out;
}

function copy(){
  navigator.clipboard.writeText(
    document.getElementById("code")
    .innerText
  );
}

window.onload = ()=>{

  renderColors();
  update();

};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Color Generator</title>
<link rel="stylesheet" href="style.css">

<style>
.generator{
  max-width:900px;
  margin:auto;
}

.preview{
  min-height:120px;
  margin-top:20px;
  padding:20px;

  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  border-radius:20px;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:40px;
  font-weight:bold;
}

.output{
  margin-top:20px;
  padding:15px;
  border-radius:15px;
  background:#111;
  color:#fff;
  word-break:break-all;
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}
</style>

</head>
<body>

<div class="container">
<div class="card generator">

<h1>🎨 Color Code Generator</h1>

<input id="text" placeholder="Text eingeben" style="width:100%;padding:12px;border-radius:10px;border:none;">

<br><br>

<label>Farbe 1</label>
<input type="color" id="c1" value="#24ABFF">

<label>Farbe 2</label>
<input type="color" id="c2" value="#0FFF5B">

<br><br>

<label><input type="checkbox" id="gradient" checked> Verlauf</label>

<br><br>

<!-- EFFECTS -->
<div class="row">
<label><input type="checkbox" id="bold"> Fett</label>
<label><input type="checkbox" id="italic"> Kursiv</label>
<label><input type="checkbox" id="underline"> Unterstrichen</label>
<label><input type="checkbox" id="strike"> Durchgestrichen</label>
</div>

<div id="preview" class="preview">Preview</div>

<div id="output" class="output"></div>

<br>

<button onclick="generate()">Generate</button>
<button onclick="copy()">Copy</button>
<button onclick="location.href='index.html'">Back</button>

</div>
</div>

<script>

function hexToRgb(hex){
hex = hex.replace("#","");
return {
r:parseInt(hex.substring(0,2),16),
g:parseInt(hex.substring(2,4),16),
b:parseInt(hex.substring(4,6),16)
};
}

function rgbToHex(r,g,b){
return "#" + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function generate(){

const text = document.getElementById("text").value;
const preview = document.getElementById("preview");
const output = document.getElementById("output");

const c1 = document.getElementById("c1").value;
const c2 = document.getElementById("c2").value;

const grad = document.getElementById("gradient").checked;

preview.innerHTML = "";
output.innerText = "";

let format = "";

if(document.getElementById("bold").checked) format += "&l";
if(document.getElementById("italic").checked) format += "&o";
if(document.getElementById("underline").checked) format += "&n";
if(document.getElementById("strike").checked) format += "&m";

if(!grad){

preview.innerHTML =
`<span style="color:${c1}">${text}</span>`;

output.innerText =
`&${c1.replace("#","")}&${format}${text}`;

return;
}

const rgb1 = hexToRgb(c1);
const rgb2 = hexToRgb(c2);

let result = "";

for(let i=0;i<text.length;i++){

const t = i/(text.length-1||1);

const r = Math.round(rgb1.r + (rgb2.r-rgb1.r)*t);
const g = Math.round(rgb1.g + (rgb2.g-rgb1.g)*t);
const b = Math.round(rgb1.b + (rgb2.b-rgb1.b)*t);

const hex = rgbToHex(r,g,b);

preview.innerHTML += `<span style="color:${hex}">${text[i]}</span>`;

result += `&#${hex.replace("#","")}${format}${text[i]}`;
}

output.innerText = result;
}

function copy(){
navigator.clipboard.writeText(document.getElementById("output").innerText);
}

document.getElementById("text").addEventListener("input", generate);
document.getElementById("c1").addEventListener("input", generate);
document.getElementById("c2").addEventListener("input", generate);
document.getElementById("gradient").addEventListener("change", generate);

document.getElementById("bold").addEventListener("change", generate);
document.getElementById("italic").addEventListener("change", generate);
document.getElementById("underline").addEventListener("change", generate);
document.getElementById("strike").addEventListener("change", generate);

generate();

</script>

</body>
</html>

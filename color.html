<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Minecraft Color Generator</title>

<link rel="stylesheet" href="style.css">

<style>
.container{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:480px;
  padding:35px;
  border-radius:30px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(25px);
  text-align:center;
}

/* INPUTS */
input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  background:rgba(0,0,0,0.4);
  color:white;
}

/* COLORS */
.colors{
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.color-box{
  display:flex;
  gap:10px;
  align-items:center;
  background:rgba(255,255,255,0.08);
  padding:10px;
  border-radius:14px;
}

.color-box input[type=color]{
  width:45px;
  height:45px;
  border-radius:8px;
  border:none;
}

/* STYLE ROW (NEBENEINANDER) */
.style-row{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:10px;
}

.style-row label{
  background:rgba(255,255,255,0.08);
  padding:8px 12px;
  border-radius:12px;
}

/* PREVIEW */
.preview{
  margin-top:20px;
  padding:20px;
  border-radius:25px;
  background:rgba(255,255,255,0.06);
  min-height:80px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  font-weight:bold;
}

/* CODE */
.code{
  margin-top:10px;
  padding:15px;
  border-radius:16px;
  background:#111;
  color:#0f0;
  font-family:monospace;
  word-break:break-word;
}

/* BUTTON */
button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border-radius:16px;
  border:none;
  background:#3996F9;
  color:black;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="glow"></div>

<div class="container">
  <div class="card">

    <h2>Minecraft Generator</h2>

    <input type="text" id="text" placeholder="Text" oninput="update()">

    <select id="mode" onchange="update()">
      <option value="single">Einfarbig</option>
      <option value="gradient">Gradient</option>
      <option value="rainbow">Rainbow</option>
    </select>

    <!-- 🔥 STYLE -->
    <div class="style-row">
      <label><input type="checkbox" id="bold" onchange="update()"> Fett</label>
      <label><input type="checkbox" id="italic" onchange="update()"> Kursiv</label>
      <label><input type="checkbox" id="underline" onchange="update()"> Unter</label>
      <label><input type="checkbox" id="strike" onchange="update()"> Durch</label>
    </div>

    <!-- COLORS -->
    <div class="colors" id="colors"></div>

    <button onclick="addColor()">+ Farbe hinzufügen</button>

    <div class="preview" id="preview">Preview</div>
    <div class="code" id="code">Code</div>

    <button onclick="copyCode()">Copy</button>

  </div>
</div>

<script>

function addColor(val="#3996F9"){
  const div=document.createElement("div");
  div.className="color-box";
  div.innerHTML=`<input type="color" value="${val}" oninput="update()">`;
  document.getElementById("colors").appendChild(div);
}

function getColors(){
  return [...document.querySelectorAll(".color-box input")].map(i=>i.value);
}

function prefix(){
  let p="";
  if(bold.checked) p+="&l";
  if(italic.checked) p+="&o";
  if(underline.checked) p+="&n";
  if(strike.checked) p+="&m";
  return p;
}

function update(){

  const text=document.getElementById("text").value||"Preview";
  const mode=document.getElementById("mode").value;

  const colors=getColors();
  const preview=document.getElementById("preview");
  const code=document.getElementById("code");

  preview.innerText=text;

  preview.style.background="";
  preview.style.color="white";
  preview.style.textShadow="none";

  let out="";
  let p=prefix();

  if(mode==="single"){
    let c=colors[0]||"#3996F9";
    preview.style.color=c;
    preview.style.textShadow="0 0 15px "+c;
    out=`&#${c.replace("#","")}${p}${text}`;
  }

  if(mode==="gradient"){
    preview.style.background=`linear-gradient(90deg, ${colors.join(",")})`;
    preview.style.webkitBackgroundClip="text";
    preview.style.color="transparent";

    for(let i=0;i<text.length;i++){
      out+=`&#${colors[i%colors.length].replace("#","")}${p}${text[i]}`;
    }
  }

  if(mode==="rainbow"){
    let r=["#ff0000","#ff9900","#ffff00","#00ff00","#00ffff","#0000ff","#ff00ff"];

    preview.style.background=`linear-gradient(90deg, ${r.join(",")})`;
    preview.style.webkitBackgroundClip="text";
    preview.style.color="transparent";

    for(let i=0;i<text.length;i++){
      out+=`&#${r[i%r.length].replace("#","")}${p}${text[i]}`;
    }
  }

  code.innerText=out;
}

function copyCode(){
  navigator.clipboard.writeText(code.innerText);
}

window.onload=()=>{
  addColor("#3996F9");
  update();
};

</script>

</body>
</html>

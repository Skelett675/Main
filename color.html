<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Color Generator FIX</title>

<link rel="stylesheet" href="style.css">

<style>
.container {
  min-height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card {
  width: 450px;
  padding: 35px;
  border-radius: 28px;

  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(25px);

  border: 1px solid rgba(255,255,255,0.1);

  text-align:center;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;

  border-radius: 14px;
  border: none;

  background: rgba(0,0,0,0.4);
  color: white;
}

.preview {
  margin-top: 15px;
  padding: 20px;

  border-radius: 20px;
  min-height: 70px;

  background: rgba(255,255,255,0.06);

  display:flex;
  justify-content:center;
  align-items:center;

  font-size: 26px;
  font-weight: bold;

  word-break: break-word;
}

.code {
  margin-top: 10px;
  padding: 15px;

  border-radius: 16px;

  background: #111;
  color: #0f0;

  font-family: monospace;

  word-break: break-word;
}

button {
  margin-top: 10px;
  width: 100%;

  padding: 12px;

  border-radius: 14px;
  border: none;

  background: #3996F9;
  color: black;

  font-weight: bold;
  cursor: pointer;
}

.color-box {
  display:flex;
  gap:10px;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="glow"></div>

<div class="container">
  <div class="card">

    <h2>Color Generator</h2>

    <input type="text" id="text" placeholder="Text eingeben" oninput="update()">

    <select id="mode" onchange="update()">
      <option value="single">Einfarbig</option>
      <option value="gradient">Gradient</option>
      <option value="rainbow">Rainbow</option>
    </select>

    <!-- COLORS -->
    <div id="colors"></div>

    <button onclick="addColor()">+ Farbe hinzufügen</button>

    <!-- PREVIEW (SICHER SICHTBAR) -->
    <div class="preview" id="preview">Preview</div>

    <!-- CODE OUTPUT -->
    <div class="code" id="code">Code erscheint hier</div>

    <button onclick="copyCode()">Copy Code</button>

  </div>
</div>

<script>

function addColor(val="#3996F9"){
  const div = document.createElement("div");
  div.className = "color-box";

  div.innerHTML = `<input type="color" value="${val}" oninput="update()">`;

  document.getElementById("colors").appendChild(div);
}

function getColors(){
  return [...document.querySelectorAll(".color-box input")]
    .map(i => i.value);
}

/* 🔥 MAIN FIX */
function update(){

  const text = document.getElementById("text").value || "Preview";
  const mode = document.getElementById("mode").value;

  const preview = document.getElementById("preview");
  const code = document.getElementById("code");

  const colors = getColors();

  preview.innerText = text;

  /* RESET */
  preview.style.background = "";
  preview.style.webkitBackgroundClip = "";
  preview.style.color = "white";
  preview.style.textShadow = "none";

  let output = "";

  /* SINGLE */
  if(mode === "single"){
    let c = colors[0] || "#3996F9";

    preview.style.color = c;
    preview.style.textShadow = "0 0 15px " + c;

    output = `&#${c.replace("#","")}${text}`;
  }

  /* GRADIENT */
  if(mode === "gradient"){
    preview.style.background = `linear-gradient(90deg, ${colors.join(",")})`;
    preview.style.webkitBackgroundClip = "text";
    preview.style.color = "transparent";

    for(let i=0;i<text.length;i++){
      let c = colors[i % colors.length] || "#fff";
      output += `&#${c.replace("#","")}${text[i]}`;
    }
  }

  /* RAINBOW */
  if(mode === "rainbow"){
    const r = ["#ff0000","#ff9900","#ffff00","#00ff00","#00ffff","#0000ff","#ff00ff"];

    preview.style.background = `linear-gradient(90deg, ${r.join(",")})`;
    preview.style.webkitBackgroundClip = "text";
    preview.style.color = "transparent";

    for(let i=0;i<text.length;i++){
      output += `&#${r[i%r.length].replace("#","")}${text[i]}`;
    }
  }

  code.innerText = output;
}

/* COPY */
function copyCode(){
  navigator.clipboard.writeText(document.getElementById("code").innerText);
}

/* START */
window.onload = () => {
  addColor("#3996F9");
  update();
};

</script>

</body>
</html>

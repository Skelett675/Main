<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Color Generator</title>

<link rel="stylesheet" href="style.css">

<style>

/* =========================
   PAGE LAYOUT
========================= */

body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #1a1c20, #0c0d10);
  color:white;
}

/* =========================
   CENTER CARD
========================= */

.container{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:850px;
  padding:40px;
  border-radius:25px;

  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,0.1);

  box-shadow:0 10px 40px rgba(0,0,0,0.7);

  text-align:center;
}

/* =========================
   INPUTS
========================= */

input[type="text"]{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-top:10px;

  background:#111;
  color:white;
}

input[type="color"]{
  width:60px;
  height:40px;
  border:none;
  background:none;
  cursor:pointer;
}

/* =========================
   PREVIEW (GLASS + GLOW)
========================= */

.preview{
  margin-top:20px;
  padding:30px;
  border-radius:20px;

  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);

  font-size:40px;
  font-weight:bold;

  min-height:80px;

  transition:0.3s;

  box-shadow:0 0 25px rgba(57,150,249,0.2);
}

/* =========================
   OUTPUT BOX
========================= */

.output{
  margin-top:15px;
  padding:15px;
  border-radius:12px;
  background:#111;
  word-break:break-all;
}

/* =========================
   BUTTONS
========================= */

button{
  margin-top:10px;
  padding:12px 18px;
  border:none;
  border-radius:12px;

  background:#3996F9;
  color:black;
  font-weight:bold;

  cursor:pointer;

  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #3996F9;
}

/* =========================
   OPTIONS
========================= */

.row{
  margin-top:15px;
  display:flex;
  gap:15px;
  justify-content:center;
  flex-wrap:wrap;
}

label{
  cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>🎨 Color Generator</h1>

<input id="text" type="text" placeholder="Text eingeben">

<br><br>

<label>Farbe 1</label>
<input type="color" id="c1" value="#3996F9">

<label>Farbe 2</label>
<input type="color" id="c2" value="#0FFF5B">

<br><br>

<label>
<input type="checkbox" id="gradient" checked>
Verlauf
</label>

<div class="row">

<label><input type="checkbox" id="bold"> Fett</label>
<label><input type="checkbox" id="italic"> Kursiv</label>
<label><input type="checkbox" id="underline"> Unterstrichen</label>
<label><input type="checkbox" id="strike"> Durchgestrichen</label>

</div>

<div id="preview" class="preview">
Vorschau
</div>

<div id="output" class="output">
Code erscheint hier
</div>

<button onclick="generate()">Generieren</button>
<button onclick="copy()">Kopieren</button>
<button onclick="location.href='index.html'">Zurück</button>

</div>

</div>

<script>

function hexToRgb(hex){
hex = hex.replace("#","");
return {
r:parseInt(hex.substring(0,2),16),
g:parseInt(hex.substring(2,4),16),
b:parseInt(hex.substring(4,6),16)
};
}

function rgbToHex(r,g,b){
return "#" + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function generate(){

const text = document.getElementById("text").value;
const preview = document.getElementById("preview");
const output = document.getElementById("output");

const c1 = document.getElementById("c1").value;
const c2 = document.getElementById("c2").value;

const grad = document.getElementById("gradient").checked;

preview.innerHTML = "";
output.innerText = "";

let format = "";

if(document.getElementById("bold").checked) format += "&l";
if(document.getElementById("italic").checked) format += "&o";
if(document.getElementById("underline").checked) format += "&n";
if(document.getElementById("strike").checked) format += "&m";

/* =========================
   NO GRADIENT
========================= */

if(!grad){

preview.innerHTML =
`<span style="color:${c1}">${text}</span>`;

output.innerText =
`&#${c1.replace("#","")}${format}${text}`;

return;
}

/* =========================
   GRADIENT
========================= */

const rgb1 = hexToRgb(c1);
const rgb2 = hexToRgb(c2);

let result = "";

for(let i=0;i<text.length;i++){

const t = i/(text.length-1||1);

const r = Math.round(rgb1.r + (rgb2.r-rgb1.r)*t);
const g = Math.round(rgb1.g + (rgb2.g-rgb1.g)*t);
const b = Math.round(rgb1.b + (rgb2.b-rgb1.b)*t);

const hex = rgbToHex(r,g,b);

preview.innerHTML +=
`<span style="color:${hex}">${text[i]}</span>`;

result += `&#${hex.replace("#","")}${format}${text[i]}`;
}

output.innerText = result;
}

function copy(){
navigator.clipboard.writeText(
document.getElementById("output").innerText
);
}

document.getElementById("text").addEventListener("input", generate);
document.getElementById("c1").addEventListener("input", generate);
document.getElementById("c2").addEventListener("input", generate);
document.getElementById("gradient").addEventListener("change", generate);

document.getElementById("bold").addEventListener("change", generate);
document.getElementById("italic").addEventListener("change", generate);
document.getElementById("underline").addEventListener("change", generate);
document.getElementById("strike").addEventListener("change", generate);

generate();

</script>

</body>
</html>

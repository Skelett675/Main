<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Color Generator</title>

<link rel="stylesheet" href="style.css">

<style>
.container{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:480px;
  padding:35px;
  border-radius:30px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(25px);
  text-align:center;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  background:rgba(0,0,0,0.4);
  color:white;
}

.preview{
  margin-top:20px;
  padding:20px;
  border-radius:25px;
  background:rgba(255,255,255,0.06);
  min-height:80px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  font-weight:bold;
}

.code{
  margin-top:10px;
  padding:15px;
  border-radius:16px;
  background:#111;
  color:#0f0;
  font-family:monospace;
  word-break:break-word;
}

button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border-radius:16px;
  border:none;
  background:#3996F9;
  color:black;
  font-weight:bold;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="glow"></div>

<div class="container">
  <div class="card">

    <h2>Color Generator</h2>

    <input type="text" id="text" placeholder="Text" oninput="update()">

    <select id="mode" onchange="update()">
      <option value="single">Einfarbig</option>
      <option value="gradient">Gradient</option>
      <option value="rainbow">Rainbow</option>
    </select>

    <!-- 🔥 INTENSITY -->
    <label>Farb-Stärke</label>
    <input type="range" id="strength" min="1" max="5" value="3" oninput="update()">

    <div class="preview" id="preview">Preview</div>
    <div class="code" id="code">Code</div>

    <button onclick="copyCode()">Copy</button>

  </div>
</div>

<script>

function boostColor(hex, factor){

  let c = hex.replace("#","");
  let r = parseInt(c.substring(0,2),16);
  let g = parseInt(c.substring(2,4),16);
  let b = parseInt(c.substring(4,6),16);

  r = Math.min(255, Math.floor(r * factor));
  g = Math.min(255, Math.floor(g * factor));
  b = Math.min(255, Math.floor(b * factor));

  return `rgb(${r},${g},${b})`;
}

function update(){

  const text = document.getElementById("text").value || "Preview";
  const mode = document.getElementById("mode").value;
  const strength = document.getElementById("strength").value;

  const preview = document.getElementById("preview");
  const code = document.getElementById("code");

  let out = "";

  preview.innerText = text;

  preview.style.background = "";
  preview.style.color = "white";

  if(mode === "single"){

    preview.style.color = "#3996F9";
    preview.style.textShadow = "0 0 15px #3996F9";

    out = `&#3996F9${text}`;
  }

  if(mode === "gradient"){

    const colors = ["#3996F9","#00ffcc","#ff4dff","#ffff00"];

    const factor = 1 + (strength * 0.3);

    let boosted = colors.map(c => boostColor(c,factor));

    preview.style.background = `linear-gradient(90deg, ${boosted.join(",")})`;
    preview.style.webkitBackgroundClip = "text";
    preview.style.color = "transparent";

    for(let i=0;i<text.length;i++){
      out += `&#${colors[i % colors.length].replace("#","")}${text[i]}`;
    }
  }

  if(mode === "rainbow"){

    const base = ["#ff0000","#ff7a00","#ffee00","#00ff4c","#00e5ff","#004cff","#b300ff"];

    const factor = 1 + (strength * 0.3);

    let boosted = base.map(c => boostColor(c,factor));

    preview.style.background = `linear-gradient(90deg, ${boosted.join(",")})`;
    preview.style.webkitBackgroundClip = "text";
    preview.style.color = "transparent";

    for(let i=0;i<text.length;i++){
      out += `&#${base[i % base.length].replace("#","")}${text[i]}`;
    }
  }

  code.innerText = out;
}

function copyCode(){
  navigator.clipboard.writeText(document.getElementById("code").innerText);
}

window.onload = update;

</script>

</body>
</html>

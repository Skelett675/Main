<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Generator</title>

<style>
*{
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    radial-gradient(circle at top,#273b74,#0f1117 60%);
  color:white;
  padding:20px;
}

.container{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.back-button{
  align-self:flex-start;
  margin-bottom:20px;
  padding:12px 20px;
  background:#3996F9;
  color:black;
  border:none;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

.back-button:hover{
  transform:translateX(-5px);
}

.card{
  width:600px;
  max-width:95%;
  padding:35px;
  border-radius:30px;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(25px);
  box-shadow:0 0 40px rgba(57,150,249,.25);
  text-align:center;
}

h2{
  margin-top:0;
}

.preview{
  min-height:90px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:34px;
  font-weight:bold;
  padding:20px;
  margin:20px 0;
  border-radius:24px;
  background:rgba(255,255,255,.05);
  white-space:pre-wrap;
  word-wrap:break-word;
  background-size:300% 300%;
  -webkit-background-clip:text;
  background-clip:text;
}

input,
select,
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:14px;
  margin-top:12px;
}

input,
select{
  background:rgba(0,0,0,.35);
  color:white;
}

select option{
  background:#1a1a1a;
  color:white;
}

button{
  background:#3996F9;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  opacity:0.9;
}

.row{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

.row label{
  background:rgba(255,255,255,.08);
  padding:8px 12px;
  border-radius:12px;
  cursor:pointer;
  transition:.2s;
}

.row label:hover{
  background:rgba(255,255,255,.12);
}

.settings-section{
  margin-top:20px;
  padding:15px;
  background:rgba(0,0,0,.2);
  border-radius:14px;
}

.settings-section h4{
  margin:0 0 10px 0;
  font-size:14px;
  text-transform:uppercase;
  opacity:0.7;
}

.settings-section input[type="color"]{
  height:50px;
  cursor:pointer;
}

.color-list{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:14px;
  margin-top:15px;
  margin-bottom:15px;
  padding:15px;
  background:rgba(0,0,0,.2);
  border-radius:14px;
  min-height:60px;
}

.color-box{
  width:60px;
  height:60px;
  border-radius:14px;
  border:2px solid rgba(255,255,255,.15);
  cursor:pointer;
  transition:.2s;
  box-shadow:
    0 0 14px rgba(255,255,255,.1),
    inset 0 0 14px rgba(255,255,255,.1);
  position:relative;
  flex-shrink:0;
}

.color-box:hover{
  transform:scale(1.08);
}

.color-box::after{
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:20px;
  opacity:0;
  transition:.2s;
}

.code{
  margin-top:15px;
  padding:15px;
  border-radius:16px;
  background:#111;
  color:#00ff66;
  font-family:monospace;
  word-break:break-word;
  min-height:40px;
  max-height:150px;
  overflow-y:auto;
}

.copy-button{
  margin-top:12px;
}
</style>
</head>
<body>

<div class="container">
  <button class="back-button" onclick="goHome()">← Zurück</button>

  <div class="card">

    <h2>Color Generator</h2>

    <!-- PREVIEW GANZ OBEN -->
    <div class="preview" id="preview">
      Preview
    </div>

    <input
      id="text"
      placeholder="Text eingeben"
      oninput="update()"
    >

    <select id="mode" onchange="update()">
      <option value="single">Einfarbig</option>
      <option value="gradient" selected>Gradient</option>
      <option value="rainbow">Rainbow</option>
    </select>

    <div class="row">
      <label><input type="checkbox" id="bold" onchange="update()"> Fett</label>
      <label><input type="checkbox" id="italic" onchange="update()"> Kursiv</label>
      <label><input type="checkbox" id="underline" onchange="update()"> Unterstrichen</label>
      <label><input type="checkbox" id="strike" onchange="update()"> Durchgestrichen</label>
    </div>

    <div class="settings-section">
      <h4>⚙️ Einstellungen</h4>
      <label for="glowColor" style="display:block; margin-bottom:10px; text-align:left;">Glow Farbe:</label>
      <input type="color" id="glowColor" value="#3996F9" onchange="update()">
    </div>

    <button onclick="addColor()">
      🎨 Farbe hinzufügen
    </button>

    <div id="colorList" class="color-list"></div>

    <div id="code" class="code">
      Code
    </div>

    <button class="copy-button" onclick="copyCode()">
      📋 Code kopieren
    </button>

  </div>
</div>

<script>

let colors = [
  randomColor(),
  randomColor()
];

function randomColor(){
  return "#" +
    Math.floor(Math.random()*16777215)
      .toString(16)
      .padStart(6,"0");
}

function goHome(){
  window.location.href = "index.html";
}

function addColor(){
  colors.push(randomColor());
  renderColors();
  update();
}

function removeColor(index){
  if(colors.length > 1){
    colors.splice(index, 1);
    renderColors();
    update();
  }
}

function renderColors(){

  const list =
    document.getElementById("colorList");

  list.innerHTML = "";

  colors.forEach((color,index)=>{

    const box =
      document.createElement("div");

    box.className = "color-box";
    box.style.background = color;
    box.title = "Klick zum ändern\nRechtsklick zum löschen";

    box.onclick = (e)=>{

      const picker =
        document.createElement("input");

      picker.type = "color";
      picker.value = color;

      picker.style.display = "none";

      document.body.appendChild(picker);

      picker.oninput = e=>{
        colors[index] = e.target.value;
        renderColors();
        update();
      };

      picker.onchange = ()=>{
        picker.remove();
      };

      picker.click();
    };

    box.oncontextmenu = (e)=>{
      e.preventDefault();
      removeColor(index);
    };

    list.appendChild(box);

  });
}

function hexToRgb(hex){

  hex = hex.replace("#","");

  return {
    r:parseInt(hex.substring(0,2),16),
    g:parseInt(hex.substring(2,4),16),
    b:parseInt(hex.substring(4,6),16)
  };
}

function interpolate(c1,c2,t){

  const r =
    Math.round(c1.r + (c2.r-c1.r)*t);

  const g =
    Math.round(c1.g + (c2.g-c1.g)*t);

  const b =
    Math.round(c1.b + (c2.b-c1.b)*t);

  return (
    r.toString(16).padStart(2,"0") +
    g.toString(16).padStart(2,"0") +
    b.toString(16).padStart(2,"0")
  ).toUpperCase();
}

function update(){

  const text =
    document.getElementById("text").value ||
    "Preview";

  const mode =
    document.getElementById("mode").value;

  const preview =
    document.getElementById("preview");

  const code =
    document.getElementById("code");

  const glowColor =
    document.getElementById("glowColor").value;

  const bold =
    document.getElementById("bold").checked
      ? "&l" : "";

  const italic =
    document.getElementById("italic").checked
      ? "&o" : "";

  const underline =
    document.getElementById("underline").checked
      ? "&n" : "";

  const strike =
    document.getElementById("strike").checked
      ? "&m" : "";

  const format =
    bold + italic + underline + strike;

  preview.innerText = text;

  preview.style.fontWeight =
    document.getElementById("bold").checked
      ? "bold"
      : "normal";

  preview.style.fontStyle =
    document.getElementById("italic").checked
      ? "italic"
      : "normal";

  let deco = [];

  if(document.getElementById("underline").checked)
    deco.push("underline");

  if(document.getElementById("strike").checked)
    deco.push("line-through");

  preview.style.textDecoration =
    deco.join(" ");

  preview.style.boxShadow =
    `0 0 40px ${glowColor}40, inset 0 0 20px ${glowColor}20`;

  let out = "";

  if(mode==="single"){

    preview.style.background = colors[0];
    preview.style.webkitBackgroundClip = "unset";
    preview.style.backgroundClip = "unset";
    preview.style.color = colors[0];

    out =
      `&#${colors[0].replace("#","")}${format}${text}`;
  }

  if(mode==="gradient"){

    preview.style.background =
      `linear-gradient(
        90deg,
        ${colors.join(",")}
      )`;

    preview.style.backgroundSize =
      "300% 300%";

    preview.style.webkitBackgroundClip =
      "text";
      
    preview.style.backgroundClip =
      "text";

    preview.style.color =
      "transparent";

    const segments =
      colors.length - 1;

    for(let i=0;i<text.length;i++){

      const t =
        text.length === 1
        ? 0
        : i/(text.length-1);

      const seg =
        Math.min(
          segments - 0.0001,
          t * segments
        );

      const index =
        Math.floor(seg);

      const local =
        seg - index;

      const c1 =
        hexToRgb(colors[index]);

      const c2 =
        hexToRgb(colors[index+1]);

      const hex =
        interpolate(c1,c2,local);

      out +=
        `&#${hex}${format}${text[i]}`;
    }
  }

  if(mode==="rainbow"){

    const rainbow = [
      "#ff0000",
      "#ff7a00",
      "#ffee00",
      "#00ff00",
      "#00d9ff",
      "#004cff",
      "#b300ff"
    ];

    preview.style.background =
      `linear-gradient(
        90deg,
        ${rainbow.join(",")}
      )`;

    preview.style.webkitBackgroundClip =
      "text";
      
    preview.style.backgroundClip =
      "text";

    preview.style.color =
      "transparent";

    for(let i=0;i<text.length;i++){

      const t =
        text.length===1
          ? 0
          : i/(text.length-1);

      const seg =
        t * (rainbow.length-1);

      const index =
        Math.floor(seg);

      const local =
        seg - index;

      const c1 =
        hexToRgb(rainbow[index]);

      const c2 =
        hexToRgb(
          rainbow[
            Math.min(
              index+1,
              rainbow.length-1
            )
          ]
        );

      const hex =
        interpolate(c1,c2,local);

      out +=
        `&#${hex}${format}${text[i]}`;
    }
  }

  code.innerText = out;
}

function copyCode(){

  const code = document.getElementById("code").innerText;
  
  navigator.clipboard.writeText(code).then(()=>{
    const btn = event.target;
    const original = btn.innerText;
    btn.innerText = "✓ Kopiert!";
    setTimeout(()=>{
      btn.innerText = original;
    }, 2000);
  });
}

window.onload = ()=>{

  renderColors();
  update();

};
</script>

</body>
</html>

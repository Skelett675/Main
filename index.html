<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Main Website</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="glow"></div>

<!-- SETTINGS -->
<button class="gear" onclick="toggleSettings()">⚙</button>

<div class="settings" id="settings">
  <h3>Einstellungen</h3>

  <select onchange="setTheme(this.value)">
    <option value="blue">Blau</option>
    <option value="gray">Grau</option>
    <option value="purple">Lila</option>
    <option value="red">Rot</option>
    <option value="green">Grün</option>
    <option value="orange">Orange</option>
  </select>
</div>

<!-- MAIN -->
<div class="container">
  <div class="card">

    <h1>Main Website</h1>
    <p>Willkommen</p>

    <!-- 🔥 ALLE BUTTONS WIEDER DA -->
    <button onclick="location.href='info.html'">Infos</button>
    <button onclick="location.href='contact.html'">Kontakt</button>
    <button onclick="location.href='terms.html'">Terms</button>
    <button onclick="location.href='privacy.html'">Privacy</button>
    <button onclick="location.href='qr.html'">QR Generator</button>
    <button onclick="location.href='color.html'">Color Generator</button>

  </div>
</div>

<script>
function toggleSettings() {
  document.getElementById("settings").classList.toggle("show");
}

function setTheme(color) {
  const map = {
    blue: "#3996F9",
    gray: "#9aa0a6",
    purple: "#b84dff",
    red: "#ff4d4d",
    green: "#58f2a3",
    orange: "#ff9f43"
  };

  document.documentElement.style.setProperty("--accent", map[color]);
  localStorage.setItem("theme", color);
}

window.onload = () => {
  const saved = localStorage.getItem("theme");
  if (saved) setTheme(saved);
};
</script>

</body>
</html>
